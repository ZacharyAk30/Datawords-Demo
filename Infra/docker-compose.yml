x-ollama: &service-ollama
  image: ollama/ollama:latest
  container_name: ollama
  restart: unless-stopped
  ports:
    - "11434:11434"
  volumes:
    - ollama:/root/.ollama

x-init-ollama: &init-ollama
  image: ollama/ollama:latest
  container_name: ollama-pull-llama3
  volumes:
    - ollama:/root/.ollama
  entrypoint: /bin/sh
  environment:
    - OLLAMA_HOST=http://ollama:11434
  command:
    - "-c"
    - "sleep 5; ollama pull llama3"

services:
  ollama:
    <<: *service-ollama

  ollama-init:
    <<: *init-ollama

  backend:
    build:
      context: ..
      dockerfile: Infra/backend.Dockerfile
    container_name: backend
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - PORT=5001
    depends_on:
      - ollama
      - ollama-init
    ports:
      - "5001:5001"

  frontend:
    build:
      context: ..
      dockerfile: Infra/frontend.Dockerfile
    container_name: frontend
    environment:
      - VITE_API_URL=http://backend:5001
    depends_on:
      - backend
    ports:
      - "4173:4173"

volumes:
  ollama:
    driver: local

